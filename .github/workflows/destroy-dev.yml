# ──────────────────────────────────────────────────────────────
# CloudPulse — Destroy Infrastructure Pipeline
# ──────────────────────────────────────────────────────────────
# Trigger: Manual only (workflow_dispatch)
# Safety: Requires typing "destroy all resources" to confirm
# ──────────────────────────────────────────────────────────────

name: Destroy CloudPulse - Dev

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type "destroy all resources" to confirm'
        required: true
        type: string

env:
  PROJECT_ID: cloudpulse-uptime-dev
  REGION: us-central1
  WIF_PROVIDER: 'projects/658141614041/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
  WIF_SERVICE_ACCOUNT: 'cloudpulse-dev-github-sa@cloudpulse-uptime-dev.iam.gserviceaccount.com'

jobs:
  destroy:
    name: Destroy All Infrastructure
    runs-on: ubuntu-latest
    if: github.event.inputs.confirmation == 'destroy all resources'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.1"

      - name: Terraform Init
        run: terraform init
        working-directory: environments/dev

      - name: Apply Config Changes (deletion policies)
        run: |
          echo "📋 Applying config changes before destroy..."
          terraform apply -auto-approve -refresh=false
        working-directory: environments/dev
        continue-on-error: true

      - name: Destroy Cloud Run First (release DB connections)
        run: |
          echo "🔥 Destroying Cloud Run services first..."
          terraform destroy -auto-approve \
            -target=module.cloud_run \
            -target=module.load_balancer \
            -target=module.monitoring || true
        working-directory: environments/dev

      - name: Destroy Remaining Infrastructure
        run: |
          echo "⚠️  DESTROYING ALL REMAINING CLOUDPULSE RESOURCES..."
          terraform destroy -auto-approve
          echo "✅ All resources destroyed successfully."
        working-directory: environments/dev

  reject:
    name: Confirmation Failed
    runs-on: ubuntu-latest
    if: github.event.inputs.confirmation != 'destroy all resources'

    steps:
      - name: Reject
        run: |
          echo "❌ Confirmation phrase did not match."
          echo "   Expected: 'destroy all resources'"
          echo "   Received: '${{ github.event.inputs.confirmation }}'"
          exit 1
