# ──────────────────────────────────────────────────────────────
# CloudPulse — CI/CD Deployment Pipeline
# ──────────────────────────────────────────────────────────────
# Trigger: Push to main branch or manual dispatch
# Pipeline (4 stages — solves Artifact Registry chicken-and-egg):
#   1. Validate  — Lint, security scan, unit tests
#   2. Infra     — Terraform creates AR, VPC, SQL, IAM, etc.
#   3. Build     — Docker build & push (AR now exists)
#   4. Deploy    — Terraform deploys Cloud Run, LB, monitoring
# ──────────────────────────────────────────────────────────────

name: Deploy CloudPulse - Dev

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'modules/**'
      - 'environments/**'
      - '.github/workflows/deploy-dev.yml'
  pull_request:
    branches: [main]

env:
  PROJECT_ID: cloudpulse-uptime-dev
  REGION: us-central1
  REPO_NAME: cloudpulse-dev-repo
  IMAGE_NAME: cloudpulse
  WIF_PROVIDER: 'projects/658141614041/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
  WIF_SERVICE_ACCOUNT: 'cloudpulse-dev-github-sa@cloudpulse-uptime-dev.iam.gserviceaccount.com'

jobs:
  # ────────────────────────────────────────────────────────────
  # Stage 1: Validate — Lint, Security Scan, Test
  # ────────────────────────────────────────────────────────────
  validate:
    name: "1 · Validate & Scan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.1"

      - name: Terraform Format Check
        run: terraform fmt
        working-directory: environments/dev

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: tflint --init && tflint --recursive
        working-directory: environments/dev
        continue-on-error: true

      - name: Run Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: environments/dev
          framework: terraform
          soft_fail: true
          output_format: cli

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: pip install -r src/requirements.txt

      - name: Run Python Tests
        run: python -m pytest test/ -v --tb=short
        continue-on-error: true

  # ────────────────────────────────────────────────────────────
  # Stage 2: Infrastructure — Create AR, VPC, SQL, IAM, Secrets
  #   Runs Terraform for everything EXCEPT Cloud Run, LB, and
  #   Monitoring (which depend on the Docker image existing).
  # ────────────────────────────────────────────────────────────
  infrastructure:
    name: "2 · Provision Infrastructure"
    needs: validate
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.1"

      - name: Terraform Init
        run: terraform init
        working-directory: environments/dev

      - name: Terraform Apply — Infrastructure Only
        run: |
          terraform apply -auto-approve \
            -target=module.apis \
            -target=module.vpc \
            -target=module.nat \
            -target=module.vpc_connector \
            -target=module.firewall \
            -target=module.cloud_sql \
            -target=module.secrets \
            -target=module.artifact_registry \
            -target=module.iam
        working-directory: environments/dev

  # ────────────────────────────────────────────────────────────
  # Stage 3: Build — Docker Build & Push to Artifact Registry
  #   AR now exists from Stage 2, so the push will succeed.
  # ────────────────────────────────────────────────────────────
  build:
    name: "3 · Build & Push Docker Image"
    needs: infrastructure
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Generate image tag
        id: meta
        run: |
          TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.tag }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:latest \
            ./src

      - name: Push Docker image
        run: |
          docker push ${{ steps.meta.outputs.tag }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:latest

  # ────────────────────────────────────────────────────────────
  # Stage 4: Deploy — Cloud Run, Load Balancer, Monitoring
  #   Now that the Docker image exists in AR, Terraform can
  #   deploy Cloud Run services referencing that image.
  # ────────────────────────────────────────────────────────────
  deploy:
    name: "4 · Deploy Services"
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.1"

      - name: Terraform Init
        run: terraform init
        working-directory: environments/dev

      - name: Terraform Apply — Full Stack
        run: |
          terraform apply -auto-approve \
            -var="web_image=${{ needs.build.outputs.image_tag }}"
        working-directory: environments/dev

      - name: Display Outputs
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "  ✅ CloudPulse Deployment Complete!"
          echo "═══════════════════════════════════════════════════"
          echo ""
          echo "  Dashboard URL:"
          terraform output -raw dashboard_url || echo "  (pending LB provisioning)"
          echo ""
          echo ""
          echo "  Load Balancer IP:"
          terraform output -raw load_balancer_ip || echo "  (pending)"
          echo ""
          echo "═══════════════════════════════════════════════════"
        working-directory: environments/dev