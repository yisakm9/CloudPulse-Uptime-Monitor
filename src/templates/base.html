<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CloudPulse — Cloud-Native Uptime Monitoring Platform">
    <title>{% block title %}CloudPulse{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Animated background mesh -->
    <div class="bg-mesh"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <div class="brand-logo">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                        <circle cx="14" cy="14" r="12" stroke="url(#brandGrad)" stroke-width="2.5" fill="none"/>
                        <circle cx="14" cy="14" r="5" fill="url(#brandGrad)"/>
                        <circle cx="14" cy="14" r="8" stroke="url(#brandGrad)" stroke-width="1" fill="none" opacity="0.4"/>
                        <defs>
                            <linearGradient id="brandGrad" x1="0" y1="0" x2="28" y2="28">
                                <stop offset="0%" stop-color="#818cf8"/>
                                <stop offset="100%" stop-color="#6366f1"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="brand-text">Cloud<span class="brand-accent">Pulse</span></span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link active" id="nav-dashboard">
                    <span class="nav-icon">⬡</span> Dashboard
                </a>
                <a href="/api/docs" class="nav-link" target="_blank" id="nav-api">
                    <span class="nav-icon">⟐</span> API Docs
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-brand">
                <svg width="18" height="18" viewBox="0 0 28 28" fill="none" style="vertical-align: middle; margin-right: 6px;">
                    <circle cx="14" cy="14" r="12" stroke="#6366f1" stroke-width="2" fill="none" opacity="0.5"/>
                    <circle cx="14" cy="14" r="4" fill="#6366f1" opacity="0.5"/>
                </svg>
                CloudPulse — Cloud-Native Uptime Monitoring
            </div>
            <p class="footer-sub">Deployed on Google Cloud &nbsp;·&nbsp; Terraform &nbsp;·&nbsp; Cloud Run &nbsp;·&nbsp; Cloud SQL</p>
            <p class="footer-sub">Built by <a href="https://yisakmesifin.org" target="_blank" class="footer-link">Yisak Mesifin</a></p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
