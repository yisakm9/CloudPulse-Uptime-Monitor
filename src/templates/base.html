<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CloudPulse — Cloud-Native Uptime Monitoring Platform">
    <title>{% block title %}CloudPulse{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <span class="brand-icon">◉</span>
                <span class="brand-text">CloudPulse</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link active">Dashboard</a>
                <a href="/api/docs" class="nav-link" target="_blank">API Docs</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <p>CloudPulse — Cloud-Native Uptime Monitoring Platform</p>
            <p class="footer-sub">Deployed on Google Cloud • Terraform • Cloud Run • Cloud SQL</p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
